name: AI-Powered CI Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  # ── Job 1: Claude analyzes the PR before tests run ──────────────────────
  ai-risk-analysis:
    name: AI Risk Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          claude_args: "--max-turns 15"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are a senior code reviewer for an Inventory Management System
            (Spring Boot + React). Review this pull request and post your
            findings as a PR comment using `gh pr comment`.

            Provide a concise review with these sections:

            ## Risk: LOW / MEDIUM / HIGH
            One sentence justification.

            ## Critical findings
            Only violations of rules in CLAUDE.md. Format:
            - FILE:LINE — issue — fix

            ## Stock integrity
            If StockMovementService.java changed: can stock go negative?

            ## Status transitions
            If PurchaseOrderService.java changed: are transitions validated?

            ## Recommendation
            APPROVE or REQUEST CHANGES — one sentence reason.

            Be brief. Focus only on changed files.

  # ── Job 2: Build and test (runs after AI analysis) ──────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: ai-risk-analysis

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and run tests
        run: mvn clean verify -B

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7