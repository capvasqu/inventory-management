name: AI-Powered CI Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]

jobs:
  # ── Job 1: Claude analyzes the PR before tests run ──────────────────────
  ai-risk-analysis:
    name: AI Risk Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 5"
          prompt: |
            You are a senior code reviewer analyzing a Pull Request for the
            Inventory Management System (Spring Boot + React).

            Analyze the git diff of this PR and provide:

            ## Risk Assessment
            Rate the overall risk: LOW / MEDIUM / HIGH
            Justify in 2-3 sentences.

            ## Critical findings
            List any violations of business rules defined in CLAUDE.md.
            For each finding: file, line, issue, suggested fix.

            ## Stock integrity check
            Does any change affect stock levels? If yes, verify:
            - Is stock validated before OUT movements?
            - Can stock go negative after these changes?

            ## Status transition check
            Does any change affect PurchaseOrder status?
            If yes, are the allowed transitions enforced?

            ## Bugs introduced or fixed
            List any of the known BUG #N that are fixed or newly introduced.

            ## Recommendation
            APPROVE / REQUEST CHANGES — with clear reasoning.

            Keep the response concise and actionable. Focus on correctness,
            not style.

  # ── Job 2: Build and test (runs after AI analysis) ──────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: ai-risk-analysis

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and run tests
        run: mvn clean verify -B

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7